<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matchcard — Marketplace Automation & AI Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo">matchcard</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Marketplace Automation<br />&amp; AI Tools for NC</h1>
      <p class="subtitle">A suite of intelligent tools to streamline your marketplace operations — from listing to fulfilment.</p>
    </section>

    <section class="grid" id="grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Matchcard. Built for Nordic Commerce.</p>
  </footer>

  <script>
    async function loadServices() {
      const grid = document.getElementById('grid');
      try {
        const res = await fetch('./services.json');
        const services = await res.json();
        grid.innerHTML = services.map(s => {
          const isSuggestion = s.status === 'suggestion';
          const tagClass = isSuggestion ? 'tag-suggestion' : 'tag';
          const inner = `
            <div class="card-icon">${s.icon}</div>
            <h2>${s.name}</h2>
            <p>${s.description}</p>
            <div class="card-footer">
              <span class="${tagClass}">${s.category}</span>
              ${s.url ? `<span class="card-link">Open →</span>` : '<span class="card-coming-soon">Coming soon</span>'}
            </div>
          `;
          return s.url
            ? `<a class="card" href="${s.url}" target="_blank" rel="noopener">${inner}</a>`
            : `<div class="card card-inactive">${inner}</div>`;
        }).join('');
      } catch (e) {
        grid.innerHTML = '<p class="error">Could not load services.</p>';
      }
    }
    loadServices();
  </script>

</body>
</html>
