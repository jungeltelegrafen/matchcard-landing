<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Matchcard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5EFE6;
      --accent: #C97B4B;
      --text: #2B1E10;
      --muted: #7A6452;
      --border: #E8DFD0;
      --surface: #FFFFFF;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    html { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    .screen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      box-shadow: 0 4px 24px rgba(80,50,20,0.08);
    }

    .brand { text-align: center; }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .tagline { font-size: 0.88rem; color: var(--muted); margin-top: 6px; }

    .divider { width: 100%; height: 1px; background: var(--border); }

    .signin-label {
      font-size: 0.82rem; color: var(--muted); text-align: center;
    }

    /* Official Microsoft button */
    .ms-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%;
      background: #2F2F2F; color: #fff;
      border: none; border-radius: 4px;
      padding: 12px 16px;
      font-family: var(--font); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s;
    }
    .ms-btn:hover { background: #1a1a1a; }
    .ms-btn svg { flex-shrink: 0; }

    .footer-note {
      font-size: 0.75rem; color: var(--muted); text-align: center; line-height: 1.6;
    }
  </style>
  <script>
    const next = new URLSearchParams(location.search).get('next') || '/'
    document.getElementById('signin-btn').href = `/api/auth/signin?next=${encodeURIComponent(next)}`
  </script>
</head>
<body>
  <div class="screen">
    <div class="card">
      <div class="brand">
        <div class="logo">matchcard</div>
        <div class="tagline">Marketplace Automation &amp; AI Tools for NC</div>
      </div>

      <div class="divider"></div>

      <p class="signin-label">Sign in to access the marketplace</p>

      <a class="ms-btn" id="signin-btn" href="/api/auth/signin">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 23 23">
          <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
          <rect x="12" y="1"  width="10" height="10" fill="#7FBA00"/>
          <rect x="1"  y="12" width="10" height="10" fill="#00A4EF"/>
          <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
        </svg>
        Sign in with Microsoft
      </a>

      <p class="footer-note">
        Access is restricted to authorised accounts.<br />
        Contact your administrator if you need access.
      </p>
    </div>
  </div>
</body>
</html>
