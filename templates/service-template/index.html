<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matchcard Service</title>
    <!-- Only load sandbox banner in production — avoids the 28px padding-top on localhost -->
    <script>
      if (location.hostname !== 'localhost' && !location.hostname.startsWith('127.')) {
        var s = document.createElement('script');
        s.src = 'https://matchcard.no/sandbox-banner.js';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
